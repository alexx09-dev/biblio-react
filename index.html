<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biblioteca Personal</title>

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── Paleta de colores ── */
      :root {
        --bg:        #080b14;
        --surface:   #0f1422;
        --surface2:  #161c2d;
        --gold:      #f4c430;
        --gold-dim:  #b8922a;
        --blue-acc:  #3b82f6;
        --red-acc:   #ef4444;
        --green-acc: #22c55e;
        --text:      #e2e8f0;
        --muted:     #64748b;
        --border:    rgba(244, 196, 48, 0.13);
      }

      /* ── Base ── */
      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        min-height: 100vh;
        position: relative;
      }

      /* ── Atmósfera de fondo ── */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.045) 0%, transparent 60%),
          radial-gradient(ellipse at 80% 80%, rgba(244, 196, 48, 0.04) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
      }

      /* ── Animaciones ── */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes slideInUp {
        from { opacity: 0; transform: translateY(40px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(60px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.88); }
        to   { opacity: 1; transform: scale(1); }
      }

      @keyframes shimmer {
        0%   { background-position: -400px 0; }
        100% { background-position:  400px 0; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Bootstrap 5 JS Bundle -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
